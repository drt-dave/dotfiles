# ========================================
# PREFIX: Ctrl+Space (like vim leader)
# ========================================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Enable full 256-color support
set -g default-terminal "tmux-256color"

# Allow Vim and other programs to use RGB colors
set -as terminal-overrides ',xterm-256color:RGB'

# Vi-like keybindings in copy mode (optional but nice)
setw -g mode-keys vi

# ========================================
# VIM-STYLE COPY MODE
# ========================================
# Enter copy mode with Space (like vim visual mode)
bind Space copy-mode
bind C-u copy-mode

# Copy mode vim bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Fix escape key delay (important for hjkl responsiveness)
set -sg escape-time 0

# Quality of life
set -g mouse on
set -g history-limit 10000
set -g base-index 1        # Start windows at 1 (like vim tabs)
setw -g pane-base-index 1  # Start panes at 1
#Vim-stylelll pane switching

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ========================================
# VIM-STYLE PANE RESIZING (HJKL)
# ========================================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Crear sesión con 4 paneles (2 arriba, 2 abajo)
# DISABLED: Use 'tmuxdev' alias instead to avoid conflicts on tmux startup
# new-session -d -s dev -x 200 -y 50
#
# # Dividir verticalmente: izquierda (40%) y derecha (60%)
# split-window -h -p 60
#
# # Dividir panel derecho horizontalmente: arriba (90%) y abajo (10%)
# split-window -v -p 10
#
# # Seleccionar panel izquierdo y dividirlo horizontalmente: arriba (90%) y abajo (10%)
# select-pane -t 0
# split-window -v -p 10
#
# # Seleccionar el panel superior izquierdo como activo
# select-pane -t 0

# Abrir nuevos paneles en el mismo directorio del panel actual
bind - split-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Sincronizar portapapeles con el sistema
set -g set-clipboard on
set -g set-clipboard external

# ========================================
# QUICK CONFIG RELOAD (like :source $MYVIMRC)
# ========================================
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ========================================
# WINDOW MANAGEMENT (like vim buffers)
# ========================================
bind n next-window
bind p previous-window

# ========================================
# SPECIAL CHARACTERS (like vim leader)
# ========================================
# Type < with Ctrl+Space + ,,
bind , send-keys '<'
bind . send-keys '>'
